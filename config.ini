[app]
; 이 루트 config.ini는 초기 설정 예시입니다.
; 첫 실행 후에는 %APPDATA%\ExtrusionUploader\config.ini가 기본 지속 설정이 됩니다.
; 저장소 루트 `.env`와 os.environ이 AppData 설정을 덮어쓸 수 있습니다.

supabase_url = http://127.0.0.1:54321
supabase_anon_key = YOUR_SUPABASE_ANON_KEY
edge_function_url =
plc_dir = C:/Users/user/Documents/GitHub/Extrusion_data/PLC_data
smart_sync = true
auto_upload = false
range_mode = yesterday
custom_date_start =
custom_date_end =
mtime_lag_min = 15
check_lock = true

; 로컬 실행 기준 주소: http://127.0.0.1:54321
; edge_function_url을 비워두면 SUPABASE_URL/functions/v1/upload-metrics로 자동 계산됩니다.
; Settings의 "비우기"는 edge_function_url 입력값만 지우며, 저장 후 적용됩니다.
; smart_sync=true 이면 서버 최신 timestamp 기준으로 가능한 경우만 필터합니다.
; auto_upload=true 이면 GUI 실행 후 5초 뒤 Start Upload를 자동 시도합니다.
; Start Upload는 현재 PLC_DIR만 사용합니다.
; Docker 네트워크 안에서 실행하는 경우에는 호스트 주소 대신 컨테이너 내부 주소를 사용하세요.
; edge_function_url 수동 지정은 가능하지만, 사용할 때는 대상 서버를 정확히 확인하세요.

; 예시 (주석 처리된 cloud 프로젝트):
; supabase_url = https://YOUR_PROJECT_REF.supabase.co
; supabase_anon_key = YOUR_PUBLIC_ANON_JWT
; edge_function_url = https://YOUR_PROJECT_REF.supabase.co/functions/v1/upload-metrics
